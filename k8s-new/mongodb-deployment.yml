apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-deployment #our deployment name
  namespace: chat-app #deployment namespace
  labels:
    app:  mongodb #deployment label
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb #the label which deployment will match to get it's pods
  template:
    metadata:
      labels:
        app: mongodb #pod label
    spec:
      containers:
      - image: mongo:latest #dockerhub image from where we will get the mongodb image
        name:  chatapp-mongodb #container name 
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: mongoadmin
        - name: MONGO_INITDB_ROOT_PASSWORD
          value: secret
        ports:
        - containerPort: 27017 #The container listens on port 80
          name:  mongodb-port #giving a name for port