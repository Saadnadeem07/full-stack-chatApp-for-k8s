apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment #our deployment name
  namespace: chat-app #deployment namespace
  labels:
    app:  backend #deployment label
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend #the label which deployment will match to get it's pods
  template:
    metadata:
      labels:
        app: backend #pod label
    spec:
      containers:
      - image:  saadnadeem07/chatapp-backend #dockerhub image from where we will get the backend image
        name:  chatapp-backend #container name 
        env:
        - name:  NODE_ENV #env variable
          value:  production # env variable value
        - name: MONGODB_URI
          value: "mongodb://mongoadmin:secret@mongodb:27017/dbname?authSource=admin"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: chatapp-secrets
              key: jwt 
        ports:
        - containerPort:  5001 #The container listens on port 5001